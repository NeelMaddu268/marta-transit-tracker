name: MartaTracker
options:
  bundleIdPrefix: com.personal.martatracker
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

configFiles:
  Debug: MartaTracker/Config/Secrets.xcconfig
  Release: MartaTracker/Config/Secrets.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

schemes:
  MartaTracker:
    build:
      targets:
        MartaTracker: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MartaTrackerTests

targets:
  MartaTracker:
    type: application
    platform: iOS
    sources:
      - path: MartaTracker
        excludes:
          - "Config/*.xcconfig"
    dependencies:
      - target: MartaWidget
        embed: true
    entitlements:
      path: MartaTracker/MartaTracker.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.personal.martatracker
    settings:
      base:
        INFOPLIST_FILE: MartaTracker/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.martatracker.MartaTracker
        PRODUCT_NAME: MartaTracker
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 3YNDZ959CR   # neelmaddu1@gmail.com personal team
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  MartaTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MartaTrackerTests
    dependencies:
      - target: MartaTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.martatracker.MartaTrackerTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MartaTracker.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)MartaTracker"
        BUNDLE_LOADER: "$(TEST_HOST)"
        DEVELOPMENT_TEAM: 3YNDZ959CR
        CODE_SIGN_STYLE: Automatic

  # Home-screen widget: next departures for the saved commute. Shares the
  # dependency-free GTFS-RT decoder + commute model with the app, and reads
  # commutes via the App Group.
  MartaWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: MartaWidget
      - path: MartaTracker/Services/AppGroup.swift
      - path: MartaTracker/Services/CommuteStore.swift
      - path: MartaTracker/Services/ProtobufReader.swift
      - path: MartaTracker/Services/GTFSRealtime.swift
      - path: MartaTracker/Services/RouteCatalog.swift
      - path: MartaTracker/Services/TextSearch.swift
      - path: MartaTracker/Models/Commute.swift
      - path: MartaTracker/Models/Vehicle.swift
      - path: MartaTracker/Resources/trip_headsigns.json
      - path: MartaTracker/Resources/stops.txt
    entitlements:
      path: MartaWidget/MartaWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.personal.martatracker
    info:
      path: MartaWidget/Info.plist
      properties:
        CFBundleDisplayName: MARTA Commute
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.martatracker.MartaTracker.MartaWidget
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 3YNDZ959CR
        SKIP_INSTALL: YES
